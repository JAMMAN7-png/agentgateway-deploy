# yaml-language-server: $schema=https://agentgateway.dev/schema/config

binds:
- port: 3000
  listeners:
  - routes:
    - policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - mcp-protocol-version
          - content-type
          - cache-control
          - authorization
          exposeHeaders:
          - "Mcp-Session-Id"
        jwtAuth:
          mode: optional
          issuer: "chains-pilot"
          audiences: ["gateway.v244.net"]
          jwks:
            file: /jwks.json
      backends:
      - mcp:
          targets:
          - name: exa
            mcp:
              host: https://mcp.exa.ai/mcp?exaApiKey=$EXA_API_KEY
          - name: firecrawl
            mcp:
              host: https://mcp.firecrawl.dev/$FIRECRAWL_API_KEY/v2/mcp
          - name: tavily
            mcp:
              host: https://mcp.tavily.com/mcp/?tavilyApiKey=$TAVILY_API_KEY
          - name: context7
            mcp:
              host: https://context7.liam.sh/mcp
          - name: grep
            mcp:
              host: https://mcp.grep.app
          - name: deepwiki
            mcp:
              host: https://mcp.deepwiki.com/mcp
          - name: github
            mcp:
              host: https://api.githubcopilot.com/mcp/
          - name: sequential-thinking
            stdio:
              cmd: npx
              args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
          - name: fetch
            stdio:
              cmd: npx
              args: ["-y", "@modelcontextprotocol/server-fetch"]
          - name: brave
            stdio:
              cmd: npx
              args: ["-y", "@anthropic/mcp-server-brave-search"]
              env:
                BRAVE_API_KEY: "$BRAVE_API_KEY"
          - name: duckduckgo
            stdio:
              cmd: uvx
              args: ["duckduckgo-mcp-server"]
          - name: playwright
            stdio:
              cmd: npx
              args: ["-y", "@playwright/mcp@latest", "--extension"]
              env:
                PLAYWRIGHT_MCP_EXTENSION_TOKEN: "$PLAYWRIGHT_MCP_EXTENSION_TOKEN"
